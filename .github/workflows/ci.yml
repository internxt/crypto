name: CI
on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  tests:
    strategy:
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: yarn

      - name: Add .npmrc
        run: cp .npmrc.template .npmrc

      - name: Install dependencies
        run: yarn

      - name: Install Playwright Browsers
        run: yarn playwright install chromium

      - name: Build
        run: yarn run build

      - name: Run tests
        run: yarn test
